server.port=8080

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/academic_advisor?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=YOUR_LOCAL_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

app.jwt.secret=GENERATE_A_RANDOM_LONG_SECRET_KEY_HERE
app.jwt.expiration=86400000

# ----------------------------------------------------
# Groq Config (Free, No billing needed)
# ----------------------------------------------------
groq.api.key=YOUR_GROQ_API_KEY
groq.model=llama-3.1-8b-instant

# ----------------------------------------------------
# Gemini Config (Google AI Studio)
# ----------------------------------------------------
gemini.api.key=YOUR_GEMINI_API_KEY
gemini.model=gemini-2.5-flash
